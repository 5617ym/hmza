<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>وصلة المالية</title>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <div class="bg-scene" aria-hidden="true">
    <div class="bg-vignette"></div>
    <div class="bg-radial"></div>
    <div class="bg-grid"></div>

    <span class="dust dust-1"></span>
    <span class="dust dust-2"></span>
    <span class="dust dust-3"></span>
    <span class="dust dust-4"></span>
    <span class="dust dust-5"></span>
    <span class="dust dust-6"></span>
    <span class="dust dust-7"></span>
    <span class="dust dust-8"></span>
    <span class="dust dust-9"></span>
    <span class="dust dust-10"></span>

    <span class="node node-1"></span>
    <span class="node node-2"></span>
    <span class="node node-3"></span>
    <span class="node node-4"></span>
    <span class="node node-5"></span>
    <span class="node node-6"></span>

    <span class="line line-1"></span>
    <span class="line line-2"></span>
    <span class="line line-3"></span>
    <span class="line line-4"></span>

    <div class="chain chain-left">
      <span class="chain-link"></span>
      <span class="chain-link"></span>
      <span class="chain-link"></span>
      <span class="chain-link"></span>
      <span class="chain-link"></span>
    </div>

    <div class="chain chain-right">
      <span class="chain-link"></span>
      <span class="chain-link"></span>
      <span class="chain-link"></span>
      <span class="chain-link"></span>
      <span class="chain-link"></span>
    </div>
  </div>

  <header class="hero">
    <div class="hero-inner container">
      <h1 class="hero-title">وصلة المالية</h1>
      <p class="hero-subtitle">تتحدث مع الأرقام وتخبرنا عن الأداء</p>
    </div>
  </header>

  <main class="container content">
    <section class="panel">
      <div class="panel-glow"></div>

      <div class="panel-head">
        <div class="panel-title">
          <h2>ارفع ملفاتك واترك الباقي علينا</h2>
        </div>
      </div>

      <div class="panel-body">
        <div class="grid-2">
          <div>
            <label class="label" for="period">الفترة</label>
            <div class="select-wrap">
              <select id="period" class="select">
                <option value="yearly" selected>سنوي</option>
                <option value="quarterly">ربعي</option>
                <option value="ttm">آخر 12 شهر</option>
              </select>
            </div>
          </div>

          <div>
            <label class="label" for="compare">المقارنة</label>
            <div class="select-wrap">
              <select id="compare" class="select">
                <option value="none" selected>بدون مقارنة</option>
                <option value="prev">مقارنة بفترة سابقة</option>
                <option value="industry">مقارنة بمتوسط القطاع (لاحقًا)</option>
              </select>
            </div>
          </div>
        </div>

        <div class="uploader">
          <div class="uploader-row">
            <div class="upload-topline">
              <label class="fake-file-btn" for="fileInput">اختر الملفات</label>
              <span class="upload-empty-text">لم يتم اختيار أي ملف</span>
            </div>

            <input
              id="fileInput"
              class="file"
              type="file"
              multiple
              accept="*/*"
            />
          </div>

          <div id="fileList" class="file-list"></div>
        </div>

        <div class="actions">
          <button id="btnClear" class="btn btn-ghost" type="button">مسح</button>
          <button id="btnShow" class="btn btn-primary" type="button" disabled>عرض النتائج</button>
        </div>

        <div id="status" class="status"></div>
      </div>
    </section>

    <section id="results" class="results hidden">
      <div class="results-head">
        <h3>النتائج</h3>
        <p class="muted">حالياً: نعرض الملفات المرفوعة ونجهز خطوة استخراج البيانات.</p>
      </div>

      <div class="cards" id="cards"></div>
    </section>

    <footer class="footer">
      <p class="muted small footer-brand">وصلة المالية - نضع للرقم همزة</p>
    </footer>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
