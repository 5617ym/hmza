<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>وصلة المالية</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar-custom">
        <div>
            <a href="#" class="signin-link">Sign in</a>
            <span style="margin-right:15px">وصلة</span>
            <span>وصلة المالية</span>
        </div>
        <img src="assets/images/logo.png" width="35">
    </nav>

    <main class="main-wrapper">
        <img src="assets/images/logo.png" class="logo-large">
        <h1 class="site-title">وصلة المالية</h1>
        <p class="site-slogan">نتحدث مع الأرقام وتحدثنا عن الأداء</p>

        <div class="glass-panel">
            <h2 style="text-align:center; margin-bottom:30px">ارفع ملفات واترك الباقي علينا</h2>
            <div class="grid-inputs">
                <div class="input-field">
                    <label>ارفع ملفاتك</label>
                    <div class="drop-zone-area">اسحب الملفات هنا</div>
                </div>
                <div class="input-field">
                    <label>الفترة</label>
                    <select class="select-box-dark"><option>سنوي</option></select>
                </div>
                <div class="input-field">
                    <label>للمقارنة</label>
                    <select class="select-box-dark"><option>بدون مقارنة</option></select>
                </div>
            </div>
            <div class="footer-actions">
                <span style="cursor:pointer; font-weight:bold">مسح</span>
                <button class="btn-green-gradient">عرض النتائج</button>
            </div>
        </div>
    </main>
</body>
</html>
