<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>وصلة المالية</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-inner">
      <img class="hero-logo" src="assets/images/logo.png" alt="W Logo" />
      <h1 class="hero-title">وصلة المالية</h1>
      <p class="hero-subtitle">نتحدث مع الأرقام ونخبرك عن الأداء</p>

      <div class="hero-badges">
        <span class="badge">نسخة تجريبية</span>
        <span class="badge badge-muted">RTL</span>
      </div>
    </div>
  </header>

  <main class="content">
    <section class="container">

      <section class="card upload-card">
        <div class="card-head card-head-right">
          <span class="pill pill-step">الخطوة 1</span>
          <h2 class="card-title">ابدأ برفع الملفات</h2>
        </div>

        <!-- ✅ (2) حذف العبارة كاملة -->

        <div class="row two">
          <div class="field">
            <label>الفترة</label>
            <select>
              <option selected>سنوي</option>
              <option>ربع سنوي</option>
              <option>شهري</option>
            </select>
          </div>

          <div class="field">
            <label>المقارنة</label>
            <select>
              <option selected>بدون مقارنة</option>
              <option>سنة بسنة</option>
              <option>ربع بربع</option>
            </select>
          </div>
        </div>

        <div class="row file-row">
          <div class="file-box">
            <div class="file-box-title">رفع الملفات</div>
            <input type="file" multiple />
            <div class="file-note muted small">يمكنك رفع عدة ملفات دفعة واحدة.</div>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-ghost">مسح</button>
          <button class="btn btn-primary">عرض النتائج</button>
        </div>
      </section>

    </section>
  </main>

</body>
</html>
