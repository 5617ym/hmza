<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>وصلة المالية</title>

  <!-- خط منى -->
  <link href="https://fonts.googleapis.com/css2?family=Mada:wght@400;600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>

  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">

        <img src="assets/images/logo.png" alt="وصلة المالية" class="logo-img" />

        <div class="brand-text">
          <h1>وصلة المالية</h1>
          <p>نقرأ المؤشرات الحيوية للأداء المالي</p>
        </div>

      </div>

      <div class="header-badges">
        <span class="badge">نسخة تجريبية</span>
        <span class="badge badge-muted">RTL</span>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- شاشة البداية -->
    <section class="card card-large" id="uploadStage">
      <div class="card-head">
        <h3>ابدأ برفع الملفات</h3>
        <span class="pill pill-good">الخطوة 1</span>
      </div>

      <p class="muted">
        ارفع ملفاتك وسيتم تحليل البيانات تلقائيًا.
      </p>

      <div class="controls">
        <div class="control">
          <label for="period">الفترة</label>
          <select id="period">
            <option value="q">ربع سنوي</option>
            <option value="y" selected>سنوي</option>
            <option value="t">آخر 12 شهر</option>
          </select>
        </div>

        <div class="control">
          <label for="compare">المقارنة</label>
          <select id="compare">
            <option value="none" selected>بدون مقارنة</option>
            <option value="prev">مقارنة بالفترة السابقة</option>
            <option value="avg">متوسط 3 فترات</option>
          </select>
        </div>

        <div class="control">
          <label for="fileInput">رفع الملفات</label>
          <input id="fileInput" type="file" multiple />
        </div>
      </div>

      <div class="file-list" id="fileList"></div>

      <div class="stage-actions">
        <button class="btn" id="btnStart" disabled>عرض النتائج</button>
      </div>
    </section>

  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
