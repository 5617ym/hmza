<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وصلة المالية - التصميم الجديد</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body class="wasla-theme">

    <header class="navbar">
        <div class="nav-left">
            <a href="#" class="signin-btn">Sign in</a>
            <span class="nav-text">وصلة</span>
            <span class="nav-text">وصلة المالية</span>
        </div>
        <img src="assets/images/logo.png" class="nav-logo-icon">
    </header>

    <main class="content-wrapper">
        <img src="assets/images/logo.png" alt="Wasla Logo" class="main-hero-logo">
        
        <h1 class="brand-name">وصلة المالية</h1>
        <p class="brand-tagline">نتحدث مع الأرقام وتحدثنا عن الأداء</p>

        <div class="glass-container">
            <h2 class="glass-title">ارفع ملفات واترك الباقي علينا</h2>
            
            <div class="form-grid">
                <div class="input-group">
                    <label>ارفع ملفاتك</label>
                    <div class="drop-box">اسحب الملفات هنا</div>
                </div>

                <div class="input-group">
                    <label>الفترة</label>
                    <select class="dark-dropdown">
                        <option>Select</option>
                        <option>سنوي</option>
                        <option>ربعي</option>
                        <option>آخر 12 شهر</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>للمقارنة</label>
                    <select class="dark-dropdown">
                        <option>Select select</option>
                        <option>بدون مقارنة</option>
                        <option>مقارنة بفترة سابقة</option>
                    </select>
                </div>
            </div>

            <div class="button-footer">
                <button class="clear-btn-text">مسح</button>
                <button class="submit-btn-green">عرض النتائج</button>
            </div>
        </div>
    </main>

</body>
</html>
