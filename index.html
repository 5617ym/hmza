<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وصلة المالية</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-nav">
        <div class="nav-right">
            <a href="#" class="btn-sign">Sign in</a>
            <span class="nav-item">وصلة</span>
            <span class="nav-item">وصلة المالية</span>
        </div>
        <img src="assets/images/logo.png" class="mini-logo">
    </header>

    <main class="hero-section">
        <div class="logo-wrapper">
            <img src="assets/images/logo.png" alt="Wasla Logo" class="main-logo">
        </div>
        <h1 class="brand-name">وصلة المالية</h1>
        <p class="slogan">نتحدث مع الأرقام وتحدثنا عن الأداء</p>

        <div class="glass-card">
            <h2 class="card-title">ارفع ملفات واترك الباقي علينا</h2>
            
            <div class="inputs-grid">
                <div class="input-box">
                    <label>ارفع ملفاتك</label>
                    <div class="upload-zone">
                        <span>اسحب الملفات هنا</span>
                    </div>
                </div>

                <div class="input-box">
                    <label>الفترة</label>
                    <select class="custom-select">
                        <option>سنوي</option>
                        <option>ربعي</option>
                        <option>آخر 12 شهر</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>للمقارنة</label>
                    <select class="custom-select">
                        <option>بدون مقارنة</option>
                        <option>مقارنة بفترة سابقة</option>
                        <option>مقارنة بمتوسط القطاع</option>
                    </select>
                </div>
            </div>

            <div class="card-footer">
                <span class="btn-clear">مسح</span>
                <button class="btn-submit">عرض النتائج</button>
            </div>
        </div>
    </main>

</body>
</html>
