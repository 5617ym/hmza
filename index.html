<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وصلة المالية</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-navbar">
        <div class="nav-content">
            <a href="#" class="signin-button">Sign in</a>
            <span class="nav-item">وصلة</span>
            <span class="nav-item">وصلة المالية</span>
        </div>
        <img src="assets/images/logo.png" class="mini-logo-nav">
    </header>

    <main class="hero-section">
        <div class="main-logo-container">
            <img src="assets/images/logo.png" alt="Wasla Logo" class="brand-logo-large">
        </div>
        
        <h1 class="brand-title">وصلة المالية</h1>
        <p class="brand-subtitle">نتحدث مع الأرقام وتحدثنا عن الأداء</p>

        <div class="glass-card-panel">
            <h2 class="card-internal-title">ارفع ملفات واترك الباقي علينا</h2>
            
            <div class="inputs-row-container">
                <div class="form-group">
                    <label>ارفع ملفاتك</label>
                    <div class="upload-drop-zone">
                        <span>اسحب الملفات هنا</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>الفترة</label>
                    <select class="custom-dark-select">
                        <option selected>سنوي</option>
                        <option>ربعي</option>
                        <option>آخر 12 شهر</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>للمقارنة</label>
                    <select class="custom-dark-select">
                        <option selected>بدون مقارنة</option>
                        <option>مقارنة بفترة سابقة</option>
                        <option>مقارنة بمتوسط القطاع</option>
                    </select>
                </div>
            </div>

            <div class="card-action-footer">
                <span class="btn-reset-text">مسح</span>
                <button class="btn-submit-results">عرض النتائج</button>
            </div>
        </div>
    </main>

</body>
</html>
