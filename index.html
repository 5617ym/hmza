<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وصلة المالية</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="nav-bar">
        <div class="nav-right">
            <a href="#" class="btn-signin">Sign in</a>
            <span class="nav-text">وصلة</span>
            <span class="nav-text">وصلة المالية</span>
        </div>
        <img src="assets/images/logo.png" class="nav-logo-small">
    </header>

    <section class="hero-content">
        <img src="assets/images/logo.png" class="hero-logo-large" alt="Logo">
        <h1 class="brand-title">وصلة المالية</h1>
        <p class="brand-slogan">نتحدث مع الأرقام وتحدثنا عن الأداء</p>

        <div class="glass-card">
            <h2 class="card-heading">ارفع ملفات واترك الباقي علينا</h2>
            <div class="grid-inputs">
                <div class="input-col">
                    <label>ارفع ملفاتك</label>
                    <div class="drop-zone">اسحب الملفات هنا</div>
                </div>
                <div class="input-col">
                    <label>الفترة</label>
                    <select class="select-dark"><option>سنوي</option><option>ربعي</option></select>
                </div>
                <div class="input-col">
                    <label>للمقارنة</label>
                    <select class="select-dark"><option>بدون مقارنة</option></select>
                </div>
            </div>
            <div class="card-btns">
                <span class="reset-link">مسح</span>
                <button class="btn-primary">عرض النتائج</button>
            </div>
        </div>
    </section>
</body>
</html>
