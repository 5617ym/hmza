<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>وصلة المالية</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />
  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="page-bg">
    <div class="bg-vignette"></div>
    <div class="bg-radial"></div>

    <!-- Dust / particles -->
    <span class="dust dust-1"></span>
    <span class="dust dust-2"></span>
    <span class="dust dust-3"></span>
    <span class="dust dust-4"></span>
    <span class="dust dust-5"></span>
    <span class="dust dust-6"></span>
    <span class="dust dust-7"></span>
    <span class="dust dust-8"></span>

    <!-- network nodes -->
    <span class="node node-1"></span>
    <span class="node node-2"></span>
    <span class="node node-3"></span>
    <span class="node node-4"></span>
    <span class="node node-5"></span>
    <span class="node node-6"></span>

    <span class="line line-1"></span>
    <span class="line line-2"></span>
    <span class="line line-3"></span>
    <span class="line line-4"></span>

    <!-- decorative chain -->
    <div class="chain chain-left" aria-hidden="true">
      <span class="chain-link"></span>
      <span class="chain-link"></span>
      <span class="chain-link"></span>
      <span class="chain-link"></span>
      <span class="chain-link"></span>
    </div>

    <div class="chain chain-right" aria-hidden="true">
      <span class="chain-link"></span>
      <span class="chain-link"></span>
      <span class="chain-link"></span>
      <span class="chain-link"></span>
      <span class="chain-link"></span>
    </div>
  </div>

  <main class="landing">
    <section class="hero">
      <h1 class="hero-title">وصلة المالية</h1>
      <p class="hero-subtitle">تتحدث مع الأرقام وتخبرنا عن الأداء</p>

      <div class="hero-actions">
        <button class="hero-chip hero-chip-muted" type="button">RTL</button>
        <button class="hero-chip" type="button">English Version</button>
      </div>
    </section>

    <section class="upload-shell">
      <div class="upload-card">
        <div class="step-badge">الخطوة 1</div>

        <div class="card-header">
          <h2>ابدأ برفع الملفات</h2>
        </div>

        <form class="upload-form">
          <div class="form-grid">
            <div class="field">
              <label for="period">الفترة</label>
              <div class="select-wrap">
                <select id="period" name="period">
                  <option value="annual">سنوي</option>
                  <option value="quarterly">ربع سنوي</option>
                  <option value="ttm">آخر 12 شهر</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label for="comparison">المقارنة</label>
              <div class="select-wrap">
                <select id="comparison" name="comparison">
                  <option value="none">بدون مقارنة</option>
                  <option value="previous">مع الفترة السابقة</option>
                </select>
              </div>
            </div>
          </div>

          <div class="field field-file">
            <label for="fileInput">الملفات</label>

            <div class="file-box">
              <div class="file-top">
                <label class="file-button" for="fileInput">اختر الملفات</label>
                <span class="file-note">لم يتم اختيار أي ملف</span>
              </div>

              <input
                id="fileInput"
                class="native-file"
                type="file"
                multiple
              />

              <p class="file-help">
                يقبل جميع الملفات:
                Word / CSV / Excel / PDF / صور / أي نوع آخر
              </p>
            </div>
          </div>

          <div class="form-actions">
            <button class="btn btn-primary" type="button">عرض النتائج</button>
            <button class="btn btn-ghost" type="reset">مسح</button>
          </div>
        </form>
      </div>

      <div class="footer-note">
        © وصلة المالية — بناء رقمي بخطوات مترابطة
      </div>
    </section>

    <div class="star-mark" aria-hidden="true"></div>
  </main>
</body>
</html>
