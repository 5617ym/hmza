<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وصلة المالية</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-nav">
        <div class="nav-links">
            <a href="#" class="btn-sign">Sign in</a>
            <span>وصلة</span>
            <span>وصلة المالية</span>
        </div>
        <img src="assets/images/logo.png" class="mini-logo">
    </header>

    <main class="hero-container">
        <div class="main-logo-area">
            <img src="assets/images/logo.png" alt="Wasla Logo">
        </div>
        
        <h1 class="main-title">وصلة المالية</h1>
        <p class="sub-title">نتحدث مع الأرقام وتحدثنا عن الأداء</p>

        <div class="glass-card">
            <h2 class="card-header-text">ارفع ملفات واترك الباقي علينا</h2>
            
            <div class="inputs-row">
                <div class="input-item">
                    <label>ارفع ملفاتك</label>
                    <div class="upload-box">
                        <span>اسحب الملفات هنا</span>
                    </div>
                </div>

                <div class="input-item">
                    <label>الفترة</label>
                    <select class="dark-select">
                        <option selected>سنوي</option>
                        <option>ربعي</option>
                        <option>آخر 12 شهر</option>
                    </select>
                </div>

                <div class="input-item">
                    <label>للمقارنة</label>
                    <select class="dark-select">
                        <option selected>بدون مقارنة</option>
                        <option>مقارنة بفترة سابقة</option>
                        <option>مقارنة بمتوسط القطاع</option>
                    </select>
                </div>
            </div>

            <div class="card-footer">
                <span class="clear-text">مسح</span>
                <button class="action-btn">عرض النتائج</button>
            </div>
        </div>
    </main>

</body>
</html>
