<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وصلة المالية</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="header-right">
            <a href="#" class="login-btn">Sign in</a>
            <span class="nav-label">وصلة</span>
            <span class="nav-label">وصلة المالية</span>
        </div>
        <img src="assets/images/logo.png" class="header-logo">
    </header>

    <section class="hero-wrapper">
        <div class="logo-container">
            <img src="assets/images/logo.png" class="big-logo" alt="Wasla Logo">
        </div>
        <h1 class="hero-title">وصلة المالية</h1>
        <p class="hero-desc">نتحدث مع الأرقام وتحدثنا عن الأداء</p>

        <div class="main-glass-card">
            <h2 class="card-headline">ارفع ملفات واترك الباقي علينا</h2>
            <div class="inputs-row-grid">
                <div class="field-group">
                    <label>ارفع ملفاتك</label>
                    <div class="file-drop-area">اسحب الملفات هنا</div>
                </div>
                <div class="field-group">
                    <label>الفترة</label>
                    <select class="themed-select">
                        <option>سنوي</option>
                        <option>ربعي</option>
                        <option>آخر 12 شهر</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>للمقارنة</label>
                    <select class="themed-select">
                        <option>بدون مقارنة</option>
                        <option>مقارنة بفترة سابقة</option>
                    </select>
                </div>
            </div>
            <div class="card-actions">
                <span class="clear-btn">مسح</span>
                <button class="submit-btn">عرض النتائج</button>
            </div>
        </div>
    </section>
</body>
</html>
